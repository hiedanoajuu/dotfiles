general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    ignore_empty_password = true
}

background {
    monitor =
    path = ~/Pictures/wallpaper/cirno_letty.png
    blur_size = 8
    blur_passes = 3
    noise = 0.0117
}

input-field {
    position = 0, -120
    size = 300, 50
    
    outline_thickness = 3
    outer_color = rgba(86, 156, 214, 0.2)   
    inner_color = rgba(48,48,48,0.9)    
    font_color = rgba(224,224,224,1)

    placeholder_text = Password...
    font_family = Source Sans 3

    
    font_size = 11
    radius = 8
    show_input = false
    dots_spacing = 0.3
    dots_center = true
}

