env = xcursor_size,24
env = qt_font_dpi,96
env = gdk_scale,1

env = xdg_current_desktop,hyprland
env = xdg_session_type,wayland
env = qt_qpa_platform,wayland
env = qt_wayland_disable_windowdecoration,1
env = gdk_backend,wayland

env = gtk_theme,adwaita
env = gtk_use_portal,1

env = qt_auto_screen_scale_factor,1
env = qt_qpa_platformtheme,qt6ct

env = moz_enable_wayland,1
env = moz_disable_rdd_sandbox,1

env = sdl_videodriver,wayland
env = ecoprd_use_wayland,1

env = gtk_csd,0
env = electron_ozone_platform_hint,auto

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
        tap-to-click = true
        disable_while_typing = true
    }
    sensitivity = 0.0
}

general {
    gaps_in = 4
    gaps_out = 6
    border_size = 3
    col.active_border = rgba(569cd6ee) rgba(ff79c6ee) 45deg
    col.inactive_border = rgba(2d2d2dee)
    
    layout = dwindle
    }

dwindle {
    preserve_split = yes
}

animations {
    enabled = yes
    bezier = myBezier, 0.34, 1.56, 0.64, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 5, myBezier, popin
    animation = windowsOut, 1, 4, smoothOut, popin
    animation = border, 1, 8, default
    animation = fade, 1, 5, smoothIn
    animation = workspaces, 1, 4, smoothOut, slide
}

decoration {
    rounding = 12
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 2
        noise = 0.0117
        contrast = 1.2
        brightness = 1.0
    }
}


monitor=,preferred,auto,1
font_family = Source Sans 3
font_size = 11

exec-once = hypridle

exec-once = waybar
exec-once = nm-applet --indicator
exec-once = fcitx5
exec-once = hyprpaper
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = mako

$mainMod = SUPER

# Launcher
bind = $mainMod, D, exec, wofi --show drun --allow-images --insensitive
bind = $mainMod, T, exec, alacritty
bind = $mainMod, E, exec, alacritty -e zsh -c 'lf'
bind = $mainMod, B, exec, firefox
bind = $mainMod, M, exec, alacritty -e zsh -c 'neomutt'

bind = $mainMod, K, exec, alacritty -e zsh -c 'sdcv'
bind = $mainMod, C, exec, qalculate-qt
bind = $mainMod, O, exec, alacritty -e zsh -c 'todo'

# Windows Operation
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, Space, togglefloating
bind = $mainMod SHIFT, Space, pseudo

binde = $mainMod SHIFT, right, resizeactive, 10 0
binde = $mainMod SHIFT, left, resizeactive, -10 0
binde = $mainMod SHIFT, up, resizeactive, 0 -10
binde = $mainMod SHIFT, down, resizeactive, 0 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod, Tab, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Media
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86AudioRaiseVolume, exec, wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '$2*100<100{system("wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+")}'
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind = , XF86Launch1, exec, alacritty -e zsh -c 'fastfetch; read'

bind = , XF86ScreenSaver, exec, hyprlock
bind = , XF86Battery, exec, battery-info
bind = , XF86WebCam, exec, snapshot

bind = $mainMod, Print, exec, hyprshot -m output -o ~/Pictures/screenshots -f screenshot_$(date +'%Y%m%d_%H%M%S').png 
bind = ,Print, exec, hyprshot -m region -o ~/Pictures/screenshots -f screenshot_$(date +'%Y%m%d_%H%M%S').png 
bind = ALT, Print, exec, hyprshot -m window -o ~/Pictures/screenshots -f screenshot_$(date +'%Y%m%d_%H%M%S').png 
bind = $mainMod SHIFT, R, exec, hyprctl reload

bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, Q, exec, loginctl terminate-user $USER
bind = $mainMod, X, exec, ~/.local/bin/power-menu

# Waybar
layerrulev3 = blur, waybar
layerrulev3 = ignorealpha 0.6, class:^(waybar)$
bind = $mainMod SHIFT, W, exec, waybar-hide
